<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMD | Hügelton Instruments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 300;
            color: #888;
            margin-bottom: 2rem;
        }

        .plugin-image {
            max-width: 100%;
            height: auto;
            margin-bottom: 3rem;
            border-radius: 4px;
        }

        .download-button {
            display: inline-block;
            padding: 20px 50px;
            background: #fff;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .download-button:hover {
            opacity: 0.8;
        }

        .file-info {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            line-height: 1.8;
        }

        .install-guide {
            margin-top: 3rem;
            padding: 1.5rem;
            background: #252525;
            border-radius: 4px;
            text-align: left;
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.8;
        }

        .install-guide h3 {
            color: #fff;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .install-guide code {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: "SF Mono", Monaco, monospace;
            font-size: 0.8rem;
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: #666;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .download-button {
                padding: 15px 40px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VMD</h1>
        <h2>Virtual MIDI Device</h2>

        <img src="images/plugin_window.png" alt="VMD Plugin Window" class="plugin-image">

        <a href="https://github.com/kurogedelic/vmd/releases/latest" class="download-button">
            Download
        </a>

        <div class="file-info">
            ZIP Archive • 337 KB<br>
            macOS 10.15+
        </div>

        <div class="install-guide">
            <h3>Installation</h3>
            1. Download and unzip the archive<br>
            2. Press <code>⌘ + Shift + G</code> in Finder<br>
            3. Enter: <code>/Library/Audio/Plug-Ins/Components/</code><br>
            4. Copy <code>VMD.component</code> to this folder
        </div>

        <div class="footer">
            &copy; 2026 Hügelton Instruments, Kobe, Japan
        </div>
    </div>
</body>
</html>
