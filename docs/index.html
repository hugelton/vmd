<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMD | Hügelton Instruments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 3rem;
        }

        .download-button {
            display: inline-block;
            padding: 20px 50px;
            background: #fff;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .download-button:hover {
            opacity: 0.8;
        }

        .file-info {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            line-height: 1.8;
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: #666;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .download-button {
                padding: 15px 40px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Virtual MIDI Device</h1>

        <a href="https://github.com/kurogedelic/vmd/releases/latest" class="download-button">
            Download
        </a>

        <div class="file-info">
            PKG Installer • 2.5 MB<br>
            macOS 10.15+
        </div>

        <div class="footer">
            &copy; 2026 Hügelton Instruments, Kobe, Japan
        </div>
    </div>
</body>
</html>
