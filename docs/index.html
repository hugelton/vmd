<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMD - Virtual MIDI Device | Hügelton Instruments</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .brand {
            font-size: 1rem;
            color: #8892b0;
            margin-bottom: 3rem;
            letter-spacing: 3px;
        }

        .product-name {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #64ffda, #4fc3f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 1.1rem;
            color: #a8b2d1;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .download-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #64ffda 0%, #4fc3f7 100%);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(100, 255, 218, 0.3);
        }

        .download-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 255, 218, 0.4);
        }

        .footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #8892b0;
        }

        .footer a {
            color: #64ffda;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .product-name {
                font-size: 2.5rem;
            }

            .description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hügelton Instruments</h1>
        <p class="brand">KOBE, JAPAN</p>

        <div class="product-name">VMD</div>
        <p class="description">Virtual MIDI Device<br>A simple MIDI routing virtual instrument for macOS (AUv2)</p>

        <a href="https://github.com/kurogedelic/vmd/releases/latest" class="download-button">
            Download
        </a>

        <div class="footer">
            &copy; 2026 Hügelton Instruments, Kobe, Japan
        </div>
    </div>
</body>
</html>
